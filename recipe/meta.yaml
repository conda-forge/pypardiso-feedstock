{% set name = "pypardiso" %}
{% set version = "0.4.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 0f307c749ace576d9de5c63ce39af0e850d8f772697260454f3deb0202a7a92d

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - setuptools-scm  # https://conda-forge.org/docs/maintainer/knowledge_base.html#using-setuptools-scm
    - pip
  run:
    - python >={{ python_min }}
    - mkl !=2024.0
    - numpy
    - scipy

test:
  requires:
    - python {{ python_min }}
  imports:
    - pypardiso

about:
  home: https://github.com/haasad/PyPardisoProject
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Python interface to the Intel MKL Pardiso library to solve large sparse linear systems of equations

extra:
  recipe-maintainers:
    - cmutel
    - haasad
